<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что такое апсайклинг? — Recloth</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-back { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #333; font-weight: bold; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .post-container { max-width: 800px; margin: 80px auto; padding: 20px; font-family: 'Inter', sans-serif; }
        .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .img-grid img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">← На главную</a>
    <div class="post-container">
        <h1>Что такое апсайклинг?</h1>
        <p>Апсайклинг — это практика создания новой одежды из старых вещей. Это помогает беречь планету и создавать уникальный стиль.</p>
        <div class="img-grid">
            <img src="images/gallery/post1/gallery-1.jpg"><img src="images/gallery/post1/gallery-2.jpg">
            <img src="images/gallery/post1/gallery-3.jpg"><img src="images/gallery/post1/gallery-4.jpg">
            <img src="images/gallery/post1/gallery-5.jpg"><img src="images/gallery/post1/gallery-6.jpg">
        </div>
        <p>Мартин Маржела был первым, кто принес эту идею на подиум в 1993 году, используя старые театральные костюмы.</p>
    </div>
</body>
</html>
